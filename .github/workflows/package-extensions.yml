name: Package extensions

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build packages
        run: npm run pack

      - name: Upload extension packages
        uses: actions/upload-artifact@v7
        with:
          name: PoE2Dire-extension-packages
          path: dist/packages/*.zip
          if-no-files-found: error

      - name: Upload phone bookmarklet pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/gist

  deploy-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: package
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy phone bookmarklet to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  release:
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Build packages
        run: npm run pack

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/packages/PoE2Dire-chrome.zip \
            dist/packages/PoE2Dire-firefox.zip \
            dist/gist/PoE2Dire-bookmarklet.js \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
